name: Build Daily Digest

on:
  schedule:
    - cron: '30 5 * * *'   # 05:30 UTC daily
  workflow_dispatch:         # manual trigger from GitHub UI

permissions:
  contents: write   # to commit digest.json + monthly_stats.json back to the repo
  pages: write      # to deploy to GitHub Pages
  id-token: write   # required by actions/deploy-pages

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/main.py
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GUARDIAN_API_KEY:      ${{ secrets.GUARDIAN_API_KEY }}

      - name: Commit digest + stats
        run: |
          git config user.name  "digest-bot"
          git config user.email "bot@daily-digest"
          git add pwa/digest.json pwa/digests/ monthly_stats.json
          git diff --cached --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pwa

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
